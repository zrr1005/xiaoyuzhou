<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - 小宇宙总结助手</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <div class="container">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
        </svg>
        小宇宙总结助手
      </div>
      <nav>
        <a href="/">首页</a>
        <a href="/settings" class="active">设置</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="settings-page">
      <div class="settings-card">
        <h1>设置中心</h1>

        <div class="form-section">
          <h3>DeepSeek API Key</h3>
          <div class="form-group">
            <label for="deepseekKey">API Key <span class="required">*</span></label>
            <input type="password" id="deepseekKey" placeholder="sk-..." />
            <p class="hint">
              在 <a href="https://platform.deepseek.com/api_keys" target="_blank">platform.deepseek.com</a> 免费注册获取，新用户赠送额度
            </p>
          </div>
        </div>

        <div class="info-box">
          <p><strong>转录</strong>：本地 Whisper 服务自动运行，无需配置</p>
          <p><strong>总结</strong>：DeepSeek V4，国内直连，稳定快速</p>
        </div>

        <button class="btn btn-primary" onclick="saveSettings()">
          保存设置
        </button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const key = localStorage.getItem('deepseekApiKey');
      if (key) document.getElementById('deepseekKey').value = key;
    });

    function saveSettings() {
      const key = document.getElementById('deepseekKey').value.trim();
      if (!key || key.length < 5) {
        showToast('请输入有效的 DeepSeek API Key', 'error', true);
        return;
      }
      localStorage.setItem('deepseekApiKey', key);
      showToast('设置已保存', 'success');
    }

    function showToast(message, type = '', persistent = false) {
      const toast = document.createElement('div');
      toast.className = `toast ${type} ${persistent ? 'persistent' : ''}`;
      const content = document.createElement('span');
      content.textContent = message;
      toast.appendChild(content);
      if (persistent) {
        const closeBtn = document.createElement('span');
        closeBtn.className = 'toast-close';
        closeBtn.innerHTML = '&times;';
        closeBtn.onclick = () => toast.remove();
        toast.appendChild(closeBtn);
      }
      document.body.appendChild(toast);
      if (!persistent) setTimeout(() => { if (toast.parentNode) toast.remove(); }, 3000);
    }
  </script>

  <style>
    .form-section { margin-bottom: 24px; }
    .form-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text-primary); }
    .required { color: var(--error-color); font-weight: 400; font-size: 13px; }
    .info-box {
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
      font-size: 14px;
      line-height: 1.8;
      color: #0369a1;
    }
    .info-box p { margin: 0; }
  </style>
</body>
</html>
